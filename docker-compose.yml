# GPU 推理服务 Docker Compose 配置
# 运行前建议复制 .env.example 为 .env，并在 .env 中调整 GPU 编号、鉴权令牌、预热模型和缓存策略。

x-gpu-worker-common: &gpu-worker-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    # 模型共享卷在容器内的固定路径，代码会从这里读取 <project>/models/<model>.onnx。
    PROJECTS_ROOT: /workspace/projects
    # 以下变量来自 .env；冒号后的值是未配置时的默认值。
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    MAX_TENSOR_ITEMS: ${MAX_TENSOR_ITEMS:-12582912}
    MAX_LOADED_MODELS: ${MAX_LOADED_MODELS:-0}
    GPU_QUEUE_LIMIT: ${GPU_QUEUE_LIMIT:-1}
    WARMUP_MODELS: ${WARMUP_MODELS:-}
    API_TOKEN: ${API_TOKEN:-}
  volumes:
    # 模型卷只读挂载，避免推理服务误改模型文件。
    - gpu-share-volume:/workspace/projects:ro
  networks:
    - gpu-bridge
  healthcheck:
    # /ready 会检查 CUDAExecutionProvider 是否可用，比普通进程存活更适合作为容器健康检查。
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()\""]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s

services:
  gpu-worker-0:
    <<: *gpu-worker-common
    container_name: gpu-worker-0
    hostname: gpu-worker-0
    ports:
      # 只绑定宿主机本地回环地址，避免直接暴露到外网。
      - "127.0.0.1:9001:8000"
    environment:
      PROJECTS_ROOT: /workspace/projects
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_TENSOR_ITEMS: ${MAX_TENSOR_ITEMS:-12582912}
      MAX_LOADED_MODELS: ${MAX_LOADED_MODELS:-0}
      GPU_QUEUE_LIMIT: ${GPU_QUEUE_LIMIT:-1}
      WARMUP_MODELS: ${WARMUP_MODELS:-}
      API_TOKEN: ${API_TOKEN:-}
      # 限制该 worker 只能看到指定 GPU。
      NVIDIA_VISIBLE_DEVICES: ${GPU_WORKER_0_DEVICE:-0}
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_WORKER_0_DEVICE:-0}"]
              capabilities: ["gpu"]

  gpu-worker-1:
    <<: *gpu-worker-common
    container_name: gpu-worker-1
    hostname: gpu-worker-1
    ports:
      # 只绑定宿主机本地回环地址，避免直接暴露到外网。
      - "127.0.0.1:9002:8000"
    environment:
      PROJECTS_ROOT: /workspace/projects
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_TENSOR_ITEMS: ${MAX_TENSOR_ITEMS:-12582912}
      MAX_LOADED_MODELS: ${MAX_LOADED_MODELS:-0}
      GPU_QUEUE_LIMIT: ${GPU_QUEUE_LIMIT:-1}
      WARMUP_MODELS: ${WARMUP_MODELS:-}
      API_TOKEN: ${API_TOKEN:-}
      # 限制该 worker 只能看到指定 GPU。
      NVIDIA_VISIBLE_DEVICES: ${GPU_WORKER_1_DEVICE:-1}
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_WORKER_1_DEVICE:-1}"]
              capabilities: ["gpu"]

networks:
  gpu-bridge:
    # 业务容器加入这个 external network 后，可通过 http://gpu-worker-0:8000 调用推理服务。
    name: gpu-bridge
    driver: bridge

volumes:
  gpu-share-volume:
    # 外部共享模型卷，需要提前 docker volume create gpu-share-volume。
    external: true
